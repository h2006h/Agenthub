# ===========================================
# AgentHub Nginx 配置 (宝塔面板)
# ===========================================
# 使用方法:
#   1. 宝塔面板 → 网站 → 添加站点 → 填写域名
#   2. 网站 → 设置 → 配置文件 → 替换内容
#   3. 重载 Nginx
# ===========================================

server {
    listen 80;
    server_name your-domain.com;   # 替换为你的域名或服务器IP

    # 前端静态文件
    root /www/wwwroot/agenthub/client/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml font/ttf;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|ttf|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;      # AI Agent 流式响应可能较慢
        proxy_send_timeout 60s;

        # 禁用缓冲以支持 SSE 流式输出
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # WebSocket 反向代理
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;    # WebSocket 长连接
    }

    # Vue Router history 模式回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 日志
    access_log /www/wwwlogs/agenthub_access.log;
    error_log /www/wwwlogs/agenthub_error.log;
}

